<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — PathAhead</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>try{var t=localStorage.getItem('pathahead-theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <section class="hero" style="min-height:72vh;display:grid;align-items:center">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="container hero-inner">
      <div class="h-xxl text-accent" style="font-size:clamp(4rem,14vw,8rem);line-height:1">404</div>
      <h1 class="h-lg" style="margin:8px 0 14px">This page took a different path.</h1>
      <p class="lead" style="max-width:520px;margin:0 auto 32px">The page you’re looking for doesn’t exist or has moved. Let’s get you back on track.</p>
      <div class="hero-actions" style="justify-content:center">
        <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
        <a href="contact.html" class="btn btn-outline btn-lg">Contact Us</a>
      </div>
    </div>
  </section>
  <script src="js/main.js"></script>
</body>
</html>
