<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <!-- PathAhead monogram: bold navy P + orange A, rising road, star -->
  <g transform="translate(2 6) scale(0.92)">
    <!-- Navy P (bold, filled with counter) -->
    <path fill="#16294A" fill-rule="evenodd" d="M26 102 V22 H60 C78 22 88 33 88 48 C88 63 78 73 60 73 H43 V102 Z M43 36 H58 C66 36 71 41 71 48 C71 55 66 59 58 59 H43 Z"/>
    <!-- Orange A (bold, filled with counter) -->
    <path fill="#F26A21" fill-rule="evenodd" d="M83 22 L109 102 H93 L88.5 87 H70.5 L66 102 H50 Z M79.5 47 L74 71 H85 Z"/>
    <!-- Rising road (white) with dashed centerline -->
    <path d="M62 100 C64 74 72 52 84 30" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <path d="M62 100 C64 74 72 52 84 30" stroke="#16294A" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="5 9"/>
    <!-- Star + sparkles -->
    <g transform="translate(72 -2) scale(1.25)">
      <path fill="#F26A21" d="M12 2 L14.7 8.4 L21.6 9 L16.3 13.6 L18 20.5 L12 16.7 L6 20.5 L7.7 13.6 L2.4 9 L9.3 8.4 Z"/>
    </g>
    <g stroke="#F26A21" stroke-width="2.8" stroke-linecap="round">
      <path d="M78 6 L74.5 0.5"/><path d="M102 6 L105.5 0.5"/><path d="M90 -2 L90 -6.5"/>
    </g>
  </g>
</svg>
